<!-- 
* SCTA - Sistema de Control de Activos Tecnológicos
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | IT Asset Management</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/sweetalert2.css">
    <link rel="stylesheet" href="css/material.min.css">
    <link rel="stylesheet" href="css/material-design-iconic-font.min.css">
    <link rel="stylesheet" href="css/jquery.mCustomScrollbar.css">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/jquery-1.11.2.min.js"></script>
    <script src="js/material.min.js" ></script>
    <script src="js/sweetalert2.min.js" ></script>
    <script src="js/jquery.mCustomScrollbar.concat.min.js" ></script>
    <script src="js/db.js" ></script>
    <script src="js/main.js" ></script>
</head>
<body>
    <div class="login-wrap">
        <div class="container-login">
            <p class="text-center" style="font-size: 80px; margin-bottom: 10px;">
                <i class="zmdi zmdi-case-play"></i>
            </p>
            <h4 class="text-center tittles" style="color: var(--accent-cyan); margin: 0 0 5px 0;">IT ASSET MANAGER</h4>
            <p class="text-center text-condensedLight" style="color: var(--text-secondary); margin-bottom: 30px;">Sistema de Control de Activos TI</p>
            <form action="home.html">
                <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                    <input class="mdl-textfield__input" type="text" id="userName" required>
                    <label class="mdl-textfield__label" for="userName">Usuario / Correo</label>
                </div>
                <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                    <input class="mdl-textfield__input" type="password" id="pass" required>
                    <label class="mdl-textfield__label" for="pass">Contraseña</label>
                </div>
                <button class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--colored" style="width: 100%; margin-top: 25px; height: 45px;">
                    INICIAR SESIÓN
                </button>
            </form>
        </div>
    </div>
</body>
</html>
